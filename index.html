<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Fotogram</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body onload="render()">
    <header class="menu-class">
      <div class="header-wrap">
        <img src="./img/logo.svg" alt="Logo im Header von der App" />
      </div>
    </header>
    <div class="main-section-big">
      <section class="main-section wrapper">
        <h1>My Personal photo album</h1>
        <div class="main-container-images" id="main-images"></div>
        <dialog
          class="images-Dialog"
          id="imageDialog"
          onclick="closeOnOutside(event)"
        ></dialog>
      </section>
    </div>
    <footer class="footer-class">
      <div class="footer-wrap">
        <img src="./img/DA-logo.png" alt="" />
        <p>20226 Developer Akademie GmbH</p>
      </div>
    </footer>
  </body>
  <script src="./script.js"></script>
</html>
